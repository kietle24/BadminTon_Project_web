<!DOCTYPE html>
<html lang="en">

<!--
  ================================================================
  products-detail.html — Trang Chi Tiết Sản Phẩm I-BAD
  ================================================================
  Cấu trúc trang:
    1. Navbar (render động)
    2. Breadcrumb điều hướng (Trang chủ > Cửa hàng > Tên sản phẩm)
    3. Nội dung chi tiết sản phẩm (ảnh, giá, size, số lượng, nút mua/thêm giỏ)
    4. Tabs: Thông tin chi tiết | Mô tả (render khác nhau theo category)
    5. Section sản phẩm liên quan (cùng danh mục, tối đa 4 sp)
    6. Footer (render động)

  Cách hoạt động:
    - Lấy id sản phẩm từ URL param ?id=... hoặc sessionStorage (phòng file://)
    - Tra cứu trong mảng PRODUCTS (products.js)
    - Render toàn bộ HTML vào #book-content bằng template string
  ================================================================
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Title sẽ được cập nhật động theo tên sản phẩm bằng JS -->
  <title>Chi Tiết Sản Phẩm - I-BAD Badminton Shop</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- CSS tùy chỉnh của dự án -->
  <link rel="stylesheet" href="../CSS/style.css">

  <style>
    /* Hiệu ứng hover cho nút tab (Thông tin chi tiết / Mô tả) */
    .tab-btn {
      transition: all 0.3s ease;
    }

    .tab-btn:hover {
      opacity: 0.85;
    }

    /* Animation fade-in khi chuyển tab nội dung */
    .tab-content {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- ===== NAVBAR (render động) ===== -->
  <div id="navbar-placeholder"></div>

  <div class="container py-4">
    <!-- ===== BREADCRUMB điều hướng ===== -->
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#" onclick="event.preventDefault(); navigateTo('index.html');"
            style="color:#ff6633">Trang chủ</a></li>
        <li class="breadcrumb-item"><a href="#" onclick="event.preventDefault(); navigateTo('categories.html');"
            style="color:#ff6633">Cửa hàng</a></li>
        <!-- Tên sản phẩm được cập nhật động bằng JS -->
        <li class="breadcrumb-item active" id="bc-title">Chi tiết sản phẩm</li>
      </ol>
    </nav>

    <!-- ===== NỘI DUNG CHI TIẾT SẢN PHẨM (render động vào đây) ===== -->
    <div id="book-content"></div>

    <!-- ===== SECTION SẢN PHẨM LIÊN QUAN (ẩn mặc định, hiện nếu có sản phẩm) ===== -->
    <div id="related-section" class="mt-5 d-none">
      <h4 class="fw-bold mb-4">Sản Phẩm Liên Quan</h4>
      <!-- Grid 4 sản phẩm cùng danh mục -->
      <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4" id="related-books"></div>
    </div>
  </div>

  <!-- ===== FOOTER (render động) ===== -->
  <div id="footer-placeholder"></div>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Dữ liệu sản phẩm (mảng PRODUCTS) -->
  <script src="../JavaScript/products.js"></script>
  <!-- Logic giỏ hàng -->
  <script src="../JavaScript/cart.js"></script>
  <!-- Các hàm dùng chung: renderNavbar, navigateTo, formatPrice, renderProductCard... -->
  <script src="../JavaScript/components.js"></script>

  <script>
    // ─── RENDER NAVBAR VÀ FOOTER ─────────────────────────────
    renderNavbar('shop');
    renderFooter();

    // ─── LẤY ID SẢN PHẨM TỪ URL HOẶC SESSIONSTORAGE ────────
    // Ưu tiên đọc từ URL param ?id=...
    const params = new URLSearchParams(window.location.search);
    let id = parseInt(params.get('id'));

    // Fallback: nếu không có ?id (mở file:// trực tiếp), đọc từ sessionStorage
    // sessionStorage được ghi bởi navigateToProduct() trong components.js
    if (!id || isNaN(id)) {
      id = parseInt(sessionStorage.getItem('viewProductId'));
      sessionStorage.removeItem('viewProductId'); // Xóa sau khi đọc để tránh lỗi lần sau
    }

    // ─── TRA CỨU SẢN PHẨM TRONG MẢNG PRODUCTS ───────────────
    const product = PRODUCTS.find(p => p.id === id);

    // ─── XỬ LÝ KHI KHÔNG TÌM THẤY SẢN PHẨM ─────────────────
    if (!product) {
      document.getElementById('book-content').innerHTML = `
      <div class="text-center py-5">
        <h3>Không tìm thấy sản phẩm</h3>
        <a href="#" onclick="event.preventDefault(); navigateTo('categories.html'); return false;" class="btn btn-primary mt-3">Quay lại cửa hàng</a>
      </div>`;
    } else {
      // ─── CẬP NHẬT TITLE VÀ BREADCRUMB ────────────────────
      document.title = `${product.title} - I-BAD Badminton Shop`;
      document.getElementById('bc-title').textContent = product.title;

      // Tính % giảm giá để hiển thị badge
      const discount = Math.round((1 - product.price / product.originalPrice) * 100);

      // ─── RENDER HTML CHI TIẾT SẢN PHẨM ──────────────────
      // Bao gồm: ảnh, badge, giá, ưu đãi, size selector, số lượng, nút mua/thêm giỏ, tabs thông tin
      document.getElementById('book-content').innerHTML = `
      <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="card-body p-4">
          <div class="row g-4">
            <!-- Cột ảnh sản phẩm -->
            <div class="col-md-4 text-center">
              <div class="position-relative d-inline-block">
                <img src="${product.cover}" alt="${product.title}" class="img-fluid rounded-3 shadow" style="max-height:380px;object-fit:cover">
                ${product.isNew ? '<span class="badge bg-success position-absolute top-0 start-0 m-2">MỚI</span>' : ''}
                ${discount > 0 ? `<span class="badge bg-warning text-dark position-absolute top-0 end-0 m-2">-${discount}%</span>` : ''}
              </div>
            </div>
            <!-- Cột thông tin sản phẩm -->
            <div class="col-md-8">
              <small class="text-danger fw-bold">${product.brand}</small>
              <h2 class="fw-bold mb-2">${product.title}</h2>
              <div class="d-flex align-items-center gap-3 mb-3 pb-3 border-bottom" style="font-size:0.9rem">
                <span>Mã: <strong style="color:#333">${product.category}</strong></span>
                <span class="text-warning">${renderStars(product.rating)} <strong>(${product.reviews})</strong></span>
                <span class="text-success"><i class="bi bi-check-circle"></i> Còn hàng</span>
              </div>
              <!-- Giá bán và giá gốc -->
              <div class="mb-3">
                <span class="fs-1 fw-bold text-danger">${formatPrice(product.price)}</span>
                ${product.originalPrice > product.price ? `<span class="text-muted text-decoration-line-through ms-2">${formatPrice(product.originalPrice)}</span>` : ''}
                ${discount > 0 ? `<span class="badge bg-danger ms-2">-${discount}%</span>` : ''}
              </div>

              <!-- Box ưu đãi cố định (tặng vớ, cam kết chính hãng, v.v.) -->
              <div class="border rounded-3 p-3 mb-4" style="background-color:#fef5e7;border-color:#f39c12 !important">
                <div class="text-danger fw-bold mb-2">
                  <i class="bi bi-check-circle"></i> ƯU ĐÃI
                </div>
                <ul class="list-unstyled small">
                  <li class="mb-2"><i class="bi bi-check-circle text-success"></i> Tặng 1 đôi vớ cầu lông VNB (vớ VNB dải nhiều màu hoặc vớ VNB ngắn)</li>
                  <li class="mb-2"><i class="bi bi-check-circle text-success"></i> Sản phẩm cam kết chính hãng</li>
                  <li class="mb-2"><i class="bi bi-check-circle text-success"></i> Thanh toán sau khi kiểm tra và nhận hàng</li>
                  <li class="mb-2"><i class="bi bi-check-circle text-success"></i> Bảo hành chính hãng theo nhà sản xuất (Trừ hàng nội địa, xách tay)</li>
                </ul>
              </div>

              <!-- Size selector — chỉ hiển thị nếu product.sizes tồn tại (áo, quần, giày) -->
              ${product.sizes ? `
              <div class="mb-4">
                <div class="d-flex flex-wrap gap-2" id="size-selector">
                  ${product.sizes.map(size => `
                    <label class="btn btn-outline-secondary btn-sm size-option" style="cursor:pointer;padding:8px 12px;border-radius:6px">
                      <input type="radio" name="size" value="${size}" style="cursor:pointer">
                      <span>${size}</span>
                    </label>
                  `).join('')}
                </div>
                <!-- Lưu size đã chọn vào hidden input để đọc khi add to cart -->
                <input type="hidden" id="selected-size" value="">
              </div>
              ` : ''}

              <!-- Bộ chọn số lượng: nút −, input, nút + -->
              <div class="d-flex align-items-center gap-2 mb-3">
                <label class="fw-bold">Số lượng:</label>
                <button class="btn btn-outline-secondary qty-minus" style="width:40px;cursor:pointer">−</button>
                <input type="number" class="form-control form-control-sm text-center qty-input" style="width:60px" value="1" min="1">
                <button class="btn btn-outline-secondary qty-plus" style="width:40px;cursor:pointer">+</button>
              </div>

              <!-- Nút hành động: Mua ngay (→ checkout) và Thêm vào giỏ -->
              <div class="d-flex gap-2">
                <button class="btn fw-bold flex-grow-1 rounded-2 buy-now-btn" style="background-color:#ffc107;color:#333;padding:12px;font-size:1rem;border:none;cursor:pointer">Mua ngay</button>
                <button class="btn fw-bold flex-grow-1 rounded-2 add-to-cart-btn" style="background-color:#ff6633;color:white;padding:12px;font-size:1rem;border:none;cursor:pointer">
                  <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== TABS THÔNG TIN CHI TIẾT / MÔ TẢ ===== -->
      <div class="card border-0 shadow-sm rounded-3 overflow-hidden mt-4">
        <div class="d-flex">
          <!-- Tab đang active mặc định: Thông tin chi tiết -->
          <button class="tab-btn flex-grow-1 py-3 px-4 fw-bold border-0" style="background-color:#ff6633;color:white;font-size:1rem;cursor:pointer" data-tab="details">THÔNG TIN CHI TIẾT</button>
          <button class="tab-btn flex-grow-1 py-3 px-4 fw-bold border-0" style="background-color:#e8e8e8;color:#666;font-size:1rem;cursor:pointer" data-tab="description">MÔ TẢ</button>
        </div>
        <div class="p-4">
          <!-- Tab: Thông tin chi tiết — bảng thông số kỹ thuật (khác nhau theo category) -->
          <div id="details" class="tab-content">
            ${(product.category === 'Vợt Cầu Lông' || product.category === 'Giày Cầu Lông') && product.specs ? `
            <h5 style="color:#333;margin-bottom:15px"><strong>Thông Số Kỹ Thuật</strong></h5>
            <table class="table table-bordered">
              <tbody>
                ${product.category === 'Vợt Cầu Lông' ? `
                <tr style="background-color:#f8f9fa">
                  <td class="fw-bold" style="width:35%;color:#333;border-color:#ddd">Trình Độ Chơi</td>
                  <td style="border-color:#ddd">${product.specs.level}</td>
                </tr>
                <tr>
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Nội Dung Chơi</td>
                  <td style="border-color:#ddd">${product.specs.playType}</td>
                </tr>
                <tr style="background-color:#f8f9fa">
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Phong Cách Chơi</td>
                  <td style="border-color:#ddd">${product.specs.style}</td>
                </tr>
                <tr>
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Độ Cứng Dây</td>
                  <td style="border-color:#ddd">${product.specs.stringTension}</td>
                </tr>
                <tr style="background-color:#f8f9fa">
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Trọng Lượng</td>
                  <td style="border-color:#ddd">${product.specs.weight}</td>
                </tr>
                ` : `
                <tr style="background-color:#f8f9fa">
                  <td class="fw-bold" style="width:35%;color:#333;border-color:#ddd">Chất Liệu</td>
                  <td style="border-color:#ddd">${product.specs.material}</td>
                </tr>
                <tr>
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Công Nghệ Đệm</td>
                  <td style="border-color:#ddd">${product.specs.cushioning}</td>
                </tr>
                <tr style="background-color:#f8f9fa">
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Độ Bám Ggrip</td>
                  <td style="border-color:#ddd">${product.specs.grip}</td>
                </tr>
                <tr>
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Phong Cách Chơi</td>
                  <td style="border-color:#ddd">${product.specs.playStyle}</td>
                </tr>
                <tr style="background-color:#f8f9fa">
                  <td class="fw-bold" style="color:#333;border-color:#ddd">Thoáng Khí</td>
                  <td style="border-color:#ddd">${product.specs.breathability}</td>
                </tr>
                `}
              </tbody>
            </table>
            ` : `
            <!-- Fallback: bảng thông tin cơ bản nếu không có specs chi tiết -->
            <table class="table table-borderless">
              <tbody>
                <tr style="border-bottom:1px solid #eee">
                  <td class="fw-bold" style="width:30%;color:#333">Thương hiệu</td>
                  <td>${product.brand}</td>
                </tr>
                <tr style="border-bottom:1px solid #eee">
                  <td class="fw-bold" style="color:#333">Loại sản phẩm</td>
                  <td>${product.category}</td>
                </tr>
                <tr style="border-bottom:1px solid #eee">
                  <td class="fw-bold" style="color:#333">Đánh giá</td>
                  <td>${product.rating}/5.0 ⭐ (${product.reviews} đánh giá)</td>
                </tr>
                <tr style="border-bottom:1px solid #eee">
                  <td class="fw-bold" style="color:#333">Tình trạng</td>
                  <td><span style="color:#28a745">✓ Còn hàng</span></td>
                </tr>
                <tr>
                  <td class="fw-bold" style="color:#333">Giá</td>
                  <td style="color:#ff6633;font-weight:bold">${formatPrice(product.price)}</td>
                </tr>
              </tbody>
            </table>
            `}
          </div>

          <!-- Tab: Mô tả — nội dung mô tả khác nhau theo từng category -->
          <div id="description" class="tab-content d-none">
            ${product.category === 'Vợt Cầu Lông' ? `
            <p style="line-height:1.8;color:#555">
              <strong>${product.title}</strong> là vợt cầu lông cao cấp từ thương hiệu <strong>${product.brand}</strong>, được thiết kế dành riêng cho các vận động viên chuyên nghiệp.
              Với công nghệ sợi carbon tiên tiến, vợt mang lại độ cứng vừa phải và sức mạnh đánh bóng vượt trội.
              Mặt vợt rộng với lực căng dây tối ưu, giúp tăng độ chính xác và tốc độ bóng lên tới 450km/h.
            </p>
            <p style="line-height:1.8;color:#555">
              <strong>Ưu điểm nổi bật:</strong>
            </p>
            <ul style="color:#555;line-height:1.8">
              <li>✓ Khung vợt nhẹ, dễ điều khiển và tăng tốc độ phản ứng</li>
              <li>✓ Công nghệ giảm chấn tác động, bảo vệ cốt tay người chơi</li>
              <li>✓ Mặt vợt lớn, tăng điểm sweet spot cho cú đánh chính xác hơn</li>
              <li>✓ Độ bền cao, có thể sử dụng dài lâu mà không mất hiệu suất</li>
              <li>✓ Phù hợp cho cả đơn lẫn đôi, công thủ toàn diện</li>
            </ul>
            ` : product.category === 'Giày Cầu Lông' ? `
            <p style="line-height:1.8;color:#555">
              <strong>${product.title}</strong> của <strong>${product.brand}</strong> là giày cầu lông chuyên dụng, thiết kế đặc biệt cho những vận động viên cần sự ổn định tuyệt đối.
              Với công nghệ đệm khí nén và gót giày tạo hình, giày giúp giảm áp lực lên khớp gối khi di chuyển nhanh trên sân chứa.
              Đế giày chống trượt cao cấp cung cấp grip tối ưu trên mọi loại sân thi đấu.
            </p>
            <p style="line-height:1.8;color:#555">
              <strong>Ưu điểm nổi bật:</strong>
            </p>
            <ul style="color:#555;line-height:1.8">
              <li>✓ Lót giày memory foam, thoải mái suốt cả ngày</li>
              <li>✓ Hệ thống đệm khí nén, giảm chấn tác động tối đa</li>
              <li>✓ Là chống trượt cao cấp, bám tốt trên sân</li>
              <li>✓ Thiết kế thông thoáng, thoát mồ hôi hiệu quả</li>
              <li>✓ Phù hợp cho cả huấn luyện và thi đấu chuyên nghiệp</li>
            </ul>
            ` : product.category === 'Áo Cầu Lông' ? `
            <p style="line-height:1.8;color:#555">
              <strong>${product.title}</strong> của <strong>${product.brand}</strong> là áo cầu lông hiệu suất cao, được dệt từ chất liệu polyester cao cấp.
              Công nghệ quick-dry độc quyền giúp thoát mồ hôi nhanh, giữ cơ thể khô ráo suốt trận đấu.
              Thiết kế ôm cơ thể vừa vặn giúp tối ưu hóa sự di chuyển và giảm cảm giác nóng bức.
            </p>
            <p style="line-height:1.8;color:#555">
              <strong>Ưu điểm nổi bật:</strong>
            </p>
            <ul style="color:#555;line-height:1.8">
              <li>✓ Chất liệu polyester thoáng khí, co giãn 4 chiều</li>
              <li>✓ Công nghệ quick-dry, thoát mồ hôi nhanh chóng</li>
              <li>✓ Thiết kế ergonomic, không hạn chế chuyển động</li>
              <li>✓ In ấn bền màu, không phai sau nhiều lần giặt</li>
              <li>✓ Thoải mái cho huấn luyện và thi đấu liên tục</li>
            </ul>
            ` : product.category === 'Quần Cầu Lông' ? `
            <p style="line-height:1.8;color:#555">
              <strong>${product.title}</strong> từ <strong>${product.brand}</strong> là quần cầu lông chuyên dụng, thiết kế tối ưu cho sự thoải mái tối đa.
              Chất liệu nylon mềm mại kết hợp công nghệ thoát mồ hôi giúp người chơi luôn khô thoáng và tự tin.
              Thiết kế có túi, tiện lợi cho cầu thủ mang những vật dụng cần thiết.
            </p>
            <p style="line-height:1.8;color:#555">
              <strong>Ưu điểm nổi bật:</strong>
            </p>
            <ul style="color:#555;line-height:1.8">
              <li>✓ Chất liệu nylon cao cấp, mềm mại và bền bỉ</li>
              <li>✓ Công nghệ thoát mồ hôi, giữ cơ thể khô ráo</li>
              <li>✓ Thiết kế đơn giản nhưng sang trọng, dễ phối đồ</li>
              <li>✓ Có túi tiện dụng, đựng tất cả vật dụng cần thiết</li>
              <li>✓ Thoải mái cho cả luyện tập và thi đấu</li>
            </ul>
            ` : product.category === 'Túi Cầu Lông' ? `
            <p style="line-height:1.8;color:#555">
              <strong>${product.title}</strong> của <strong>${product.brand}</strong> là túi cầu lông thiết kế đặc biệt, có thể chứa khoảng 2-4 chiếc vợt cùng lúc.
              Vải chống thấm nước cao cấp bảo vệ vợt khỏi tác động và các tác nhân môi trường.
              Thiết kế ngăn chia chi tiết giúp sắp xếp gọn gàng các vật dụng cầu lông.
            </p>
            <p style="line-height:1.8;color:#555">
              <strong>Ưu điểm nổi bật:</strong>
            </p>
            <ul style="color:#555;line-height:1.8">
              <li>✓ Dung tích lớn, chứa được 2-4 chiếc vợt cùng lúc</li>
              <li>✓ Vải chống thấm nước, bảo vệ vợt tốt</li>
              <li>✓ Quai đeo chắc chắn, ôm vừa vai</li>
              <li>✓ Có nhiều ngăn chia, sắp xếp gọn gàng đồ dùng</li>
              <li>✓ Thiết kế đẹp mắt, phù hợp cho vận động viên chuyên nghiệp và sở thích</li>
            </ul>
            ` : `
            <!-- Fallback: mô tả chung cho Phụ Kiện -->
            <p style="line-height:1.8;color:#555">
              <strong>${product.title}</strong> của <strong>${product.brand}</strong> là phụ kiện cầu lông chất lượng cao, được chọn lọc kỹ lưỡng.
              Sản phẩm này giúp nâng cao trải nghiệm chơi cầu lông của bạn với tính năng chuyên dụng và thiết kế tối ưu.
              Phù hợp cho cả người mới bắt đầu lẫn vận động viên chuyên nghiệp.
            </p>
            <p style="line-height:1.8;color:#555">
              <strong>Ưu điểm nổi bật:</strong>
            </p>
            <ul style="color:#555;line-height:1.8">
              <li>✓ Chất lượng chính hãng, bảo hành toàn quốc</li>
              <li>✓ Thiết kế chuyên dụng cho cầu lông</li>
              <li>✓ Vật liệu cao cấp, độ bền lâu dài</li>
              <li>✓ Giá cạnh tranh, đáng tiền</li>
              <li>✓ Được nhiều vận động viên tin tưởng và sử dụng</li>
            </ul>
            `}
          </div>
        </div>
      </div>`;

      // ─── RENDER SẢN PHẨM LIÊN QUAN ─────────────────────────
      // Lọc tối đa 4 sản phẩm cùng danh mục, khác id hiện tại
      const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
      if (related.length > 0) {
        document.getElementById('related-section').classList.remove('d-none');
        document.getElementById('related-books').innerHTML = related.map(p => renderProductCard(p)).join('');
      }

      // ─── SỰ KIỆN CHỌN SIZE ──────────────────────────────────
      // Khi click vào một size → đổi màu nền, lưu giá trị vào #selected-size
      if (product.sizes) {
        const sizeOptions = document.querySelectorAll('.size-option input[type="radio"]');
        sizeOptions.forEach(option => {
          option.addEventListener('change', (e) => {
            // Reset style tất cả size buttons
            document.querySelectorAll('.size-option').forEach(btn => {
              btn.style.backgroundColor = '';
              btn.style.borderColor = '';
              btn.style.color = '';
            });
            // Highlight size đang chọn
            e.target.parentElement.style.backgroundColor = '#ff6633';
            e.target.parentElement.style.borderColor = '#ff6633';
            e.target.parentElement.style.color = 'white';
            document.getElementById('selected-size').value = e.target.value;
          });
        });
      }

      // ─── SỰ KIỆN CHUYỂN TAB ─────────────────────────────────
      // Click tab → ẩn tất cả .tab-content, hiện tab tương ứng, cập nhật màu nút
      const tabBtns = document.querySelectorAll('.tab-btn');
      tabBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tabName = e.target.getAttribute('data-tab');
          document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('d-none'));
          document.getElementById(tabName).classList.remove('d-none');

          tabBtns.forEach(b => {
            if (b.getAttribute('data-tab') === tabName) {
              b.style.backgroundColor = '#ff6633';
              b.style.color = 'white';
            } else {
              b.style.backgroundColor = '#e8e8e8';
              b.style.color = '#666';
            }
          });
        });
      });

      // ─── SỰ KIỆN SỐ LƯỢNG VÀ NÚT MUA ───────────────────────
      const qtyInput = document.querySelector('.qty-input');
      const qtyMinus = document.querySelector('.qty-minus');
      const qtyPlus = document.querySelector('.qty-plus');
      const buyNowBtn = document.querySelector('.buy-now-btn');
      const addToCartBtn = document.querySelector('.add-to-cart-btn');

      // Nút − giảm số lượng (tối thiểu là 1)
      if (qtyMinus) {
        qtyMinus.addEventListener('click', () => {
          const val = parseInt(qtyInput.value) || 1;
          if (val > 1) qtyInput.value = val - 1;
        });
      }

      // Nút + tăng số lượng
      if (qtyPlus) {
        qtyPlus.addEventListener('click', () => {
          qtyInput.value = (parseInt(qtyInput.value) || 1) + 1;
        });
      }

      // Nút "Mua ngay": thêm vào giỏ rồi chuyển thẳng đến checkout
      if (buyNowBtn) {
        buyNowBtn.addEventListener('click', () => {
          // Bắt buộc chọn size nếu sản phẩm có size
          if (product.sizes && !document.getElementById('selected-size').value) {
            alert('Vui lòng chọn size sản phẩm');
            return;
          }
          const qty = parseInt(qtyInput.value) || 1;
          const size = document.getElementById('selected-size')?.value || null;
          // Thêm từng đơn vị vào giỏ (mỗi lần gọi Cart.addItem sẽ tăng qty lên 1)
          for (let i = 0; i < qty; i++) {
            Cart.addItem({
              id: product.id,
              title: product.title,
              brand: product.brand,
              price: product.price,
              cover: product.cover,
              size: size
            });
          }
          Cart.updateBadge();
          navigateTo('checkout.html'); // Chuyển thẳng đến trang thanh toán
        });
      }

      // Nút "Thêm vào giỏ": thêm vào giỏ, hiện thông báo, reset số lượng và size
      if (addToCartBtn) {
        addToCartBtn.addEventListener('click', () => {
          if (product.sizes && !document.getElementById('selected-size').value) {
            alert('Vui lòng chọn size sản phẩm');
            return;
          }
          const qty = parseInt(qtyInput.value) || 1;
          const size = document.getElementById('selected-size')?.value || null;
          for (let i = 0; i < qty; i++) {
            Cart.addItem({
              id: product.id,
              title: product.title,
              brand: product.brand,
              price: product.price,
              cover: product.cover,
              size: size
            });
          }
          Cart.updateBadge();
          alert(`Đã thêm ${qty} sản phẩm vào giỏ hàng`);
          // Reset về trạng thái ban đầu sau khi thêm
          qtyInput.value = 1;
          if (product.sizes) {
            document.querySelectorAll('.size-option').forEach(btn => {
              btn.style.backgroundColor = '';
              btn.style.borderColor = '';
              btn.style.color = '';
            });
            document.querySelectorAll('.size-option input[type="radio"]').forEach(radio => radio.checked = false);
            document.getElementById('selected-size').value = '';
          }
        });
      }
    }
  </script>
</body>

</html>
