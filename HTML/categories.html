<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh Mục Sản Phẩm - I-BAD Badminton Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../CSS/style.css" />
</head>

<body>
  <!-- ===== NAVBAR ===== -->
  <div id="navbar-placeholder"></div>

  <div class="container py-4">
    <div class="row g-4">
      <!-- ===== PHẦN 1: SIDEBAR BỘ LỌC (TRÁI) ===== -->
      <div class="col-lg-3">
        <div class="card border-0 shadow-sm rounded-3 sticky-top" style="top: 76px">
          <div class="card-body filter-sidebar">
            <!-- BỘ LỌC THEO DANH MỤC -->
            <h6 class="fw-bold mb-3">Danh mục</h6>
            <div class="category-filter-group" id="cat-filter"></div>

            <hr class="my-4" />

            <!-- BỘ LỌC THEO GIÁ -->
            <h6 class="fw-bold mb-3">Giá</h6>
            <div class="price-filter">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="price" id="price-all" value="all" checked
                  onchange="filterByPrice(this.value)">
                <label class="form-check-label" for="price-all">
                  Tất cả
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="price" id="price1" value="under500k"
                  onchange="filterByPrice(this.value)">
                <label class="form-check-label" for="price1">
                  Dưới 500.000đ
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="price" id="price2" value="500k-1m"
                  onchange="filterByPrice(this.value)">
                <label class="form-check-label" for="price2">
                  500.000đ - 1.000.000đ
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="price" id="price3" value="1m-3m"
                  onchange="filterByPrice(this.value)">
                <label class="form-check-label" for="price3">
                  1.000.000đ - 3.000.000đ
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="price" id="price4" value="above3m"
                  onchange="filterByPrice(this.value)">
                <label class="form-check-label" for="price4">
                  Trên 3.000.000đ
                </label>
              </div>
            </div>

            <!-- NÚT ĐẶT LẠI BỘ LỌC -->
            <button class="btn btn-sm btn-outline-danger w-100 mt-3" onclick="resetFilters()">
              <i class="bi bi-x-circle"></i> Xóa bộ lọc
            </button>
          </div>
        </div>
      </div>

      <!-- ===== PHẦN 2: DANH SÁCH SẢN PHẨM (PHẢI) ===== -->
      <div class="col-lg-9">
        <!-- THANH CÔNG CỤ: HIỂN THỊ SỐ KẾT QUẢ, SẮPXẾP, CHUYỂN ĐỘ XEM -->
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <!-- Số lượng kết quả -->
          <span class="text-muted small" id="result-count">0 kết quả</span>

          <div class="d-flex gap-2 align-items-center">
            <!-- Dropdown sắp xếp -->
            <select class="form-select form-select-sm" id="sort-select" style="width: auto" onchange="renderProducts()">
              <option value="default">Mặc định</option>
              <option value="newest">Mới nhất</option>
              <option value="price-asc">Giá tăng dần</option>
              <option value="price-desc">Giá giảm dần</option>
              <option value="rating">Đánh giá cao</option>
            </select>

            <!-- Nút chuyển đổi chế độ xem (lưới/danh sách) -->
            <div class="btn-group btn-group-sm">
              <button class="btn btn-custom-primary" id="btn-grid" onclick="setView('grid')">
                <i class="bi bi-grid"></i>
              </button>
              <button class="btn btn-outline-custom" id="btn-list" onclick="setView('list')">
                <i class="bi bi-list"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- CONTAINER HIỂN THỊ SẢN PHẨM -->
        <div id="products-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4"></div>

        <!-- THÔNG BÁO TRỐNG (ẨN NẾU CÓ SẢN PHẨM) -->
        <div id="empty-msg" class="text-center py-5 d-none">
          <p class="text-muted mt-2">Không tìm thấy sản phẩm nào phù hợp</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JavaScript/products.js"></script>
  <script src="../JavaScript/cart.js"></script>
  <script src="../JavaScript/components.js"></script>

  <!-- ===== DANH MỤC SẢN PHẨM - MAIN SCRIPT ===== -->
  <script>
    // PHẦN 1: KHỞI TẠO NAVBAR VÀ FOOTER
    renderNavbar("categories");
    renderFooter();

    // PHẦN 2: KHÁ I BÁO VÀ BIẾN TOÀN CỤC
    const params = new URLSearchParams(window.location.search);
    let selectedCat = params.get("cat") || "Tất cả";  // Danh mục được chọn
    let selectedPrice = "all";                         // Giá được chọn
    let viewMode = "grid";                             // Chế độ xem (grid/list)

    // PHẦN 3: TẠO DANH SÁCH DANH MỤC TỪ PRODUCTS.JS
    const CATS = ["Tất cả", ...new Set(PRODUCTS.map((b) => b.category))];

    const catFilter = document.getElementById("cat-filter");

    // PHẦN 4: TẠO RADIO BUTTON CHO DANH MỤC
    CATS.forEach((cat) => {
      const div = document.createElement("div");
      div.className = "form-check";
      const id = `cat-${cat.replace(/\s+/g, '-').toLowerCase()}`;
      const label = cat === "Tất cả" ? "Tất cả danh mục" : cat;
      div.innerHTML = `
        <input class="form-check-input" type="radio" name="category" id="${id}" value="${cat}"
          onchange="filterByCategory(this.value)" ${cat === selectedCat ? 'checked' : ''}>
        <label class="form-check-label" for="${id}">
          ${label}
        </label>
      `;
      catFilter.appendChild(div);
    });

    // PHẦN 5: HÀM LỌC THEO DANH MỤC
    function filterByCategory(cat) {
      selectedCat = cat;
      renderProducts();
    }

    // PHẦN 6: HÀM LỌC THEO GIÁ
    function filterByPrice(price) {
      selectedPrice = price;
      renderProducts();
    }

    // PHẦN 7: HÀM ĐẶT LẠI BỘ LỌC
    function resetFilters() {
      selectedCat = "Tất cả";
      selectedPrice = "all";
      // Reset all category checkboxes
      document.querySelectorAll("input[name='category']").forEach(el => {
        el.checked = el.value === "Tất cả";
      });
      // Reset price filter
      document.getElementById("price-all").checked = true;
      renderProducts();
    }

    // PHẦN 8: HÀM CHUYỂN ĐỔI CHẾNH ĐỘ XEM (LƯỚI/DANH SÁCH)
    function setView(mode) {
      viewMode = mode;
      document.getElementById("btn-grid").className =
        mode === "grid" ? "btn btn-custom-primary" : "btn btn-outline-custom";
      document.getElementById("btn-list").className =
        mode === "list" ? "btn btn-custom-primary" : "btn btn-outline-custom";
      renderProducts();
    }

    // PHẦN 9: HÀM LẤY SẢN PHẨM ĐÃ LỌC
    // - Lọc theo danh mục
    // - Lọc theo giá
    // - Sắp xếp theo: mặc định, mới nhất, giá, đánh giá
    function getFiltered() {
      let products = [...PRODUCTS];

      // Lọc theo danh mục
      if (selectedCat !== "Tất cả")
        products = products.filter((b) => b.category === selectedCat);

      // Lọc theo khoảng giá
      if (selectedPrice !== "all") {
        products = products.filter((b) => {
          switch (selectedPrice) {
            case 'under500k': return b.price < 500000;
            case '500k-1m': return b.price >= 500000 && b.price < 1000000;
            case '1m-3m': return b.price >= 1000000 && b.price < 3000000;
            case 'above3m': return b.price >= 3000000;
            default: return true;
          }
        });
      }

      // Sắp xếp sản phẩm
      const sort = document.getElementById("sort-select").value;
      if (sort === "price-asc") products.sort((a, b) => a.price - b.price);
      if (sort === "price-desc") products.sort((a, b) => b.price - a.price);
      if (sort === "rating") products.sort((a, b) => b.rating - a.rating);
      if (sort === "newest")
        products.sort((a, b) => new Date(b.addedDate) - new Date(a.addedDate));
      return products;
    }

    // PHẦN 10: HÀM HIỂN THỊ SẢN PHẨM
    // - Hiển thị lưới sản phẩm (grid mode)
    // - Hoặc danh sách sản phẩm (list mode)
    function renderProducts() {
      const filtered = getFiltered();
      const grid = document.getElementById("products-grid");
      const empty = document.getElementById("empty-msg");

      // Cập nhật số lượng kết quả
      document.getElementById("result-count").textContent =
        `${filtered.length} kết quả`;

      // Kiểm tra nếu không có sản phẩm
      if (filtered.length === 0) {
        grid.innerHTML = "";
        empty.classList.remove("d-none");
        return;
      }
      empty.classList.add("d-none");

      // Hiển thị chế độ lưới (grid)
      if (viewMode === "grid") {
        grid.className = "row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4";
        grid.innerHTML = filtered.map((b) => renderBookCard(b)).join("");
      }
      // Hiển thị chế độ danh sách (list)
      else {
        grid.className = "row row-cols-1 g-3";
        grid.innerHTML = filtered
          .map(
            (b) => `
        <div class="col">
          <div class="card border-0 shadow-sm d-flex flex-row overflow-hidden product-card" style="height:130px">
            <img src="${b.cover}" style="width:90px;object-fit:cover" alt="${b.title}">
            <div class="card-body py-2 px-3 d-flex flex-column justify-content-between">
              <div>
                <span class="badge bg-light text-primary" style="font-size:.65rem">${b.category}</span>
                <h6 class="mb-0 mt-1 fw-semibold" style="font-size:.9rem">${b.title}</h6>
                <small class="text-muted">${b.brand}</small>
              </div>
              <div class="d-flex align-items-center justify-content-between">
                <span class="fw-bold price-sale">${formatPrice(b.price)}</span>
                <div class="d-flex gap-2 align-items-center">
                  <a href="products-detail.html?id=${b.id}" class="btn btn-sm btn-outline-custom rounded-pill px-3">Xem</a>
                  <button class="btn btn-custom-primary btn-sm rounded-pill px-3" onclick='addToCartHandler(${JSON.stringify({ id: b.id, title: b.title, brand: b.brand, price: b.price, cover: b.cover }).replace(/'/g, "&#39;")})'>
                    <i class="bi bi-cart-plus"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>`,
          )
          .join("");
      }
    }

    // PHẦN 11: KHỞI TẠO - HIỂN THỊ SẢN PHẨM LẦN ĐẦU TIÊN
    renderProducts();
  </script>
</body>

</html>
