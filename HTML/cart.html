<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ Hàng - I-BAD Badminton Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../CSS/style.css" />
</head>

<body>
  <div id="navbar-placeholder"></div>

  <div class="page-title-bar">
    <div class="container">
      <h1 class="fw-bold mb-0 fs-3">Giỏ Hàng</h1>
      <small class="text-muted" id="cart-count-label">0 sản phẩm</small>
    </div>
  </div>

  <div class="container py-4">
    <div id="empty-cart" class="text-center py-5 d-none">
      <i class="bi bi-cart3" style="font-size: 4rem; color: #d1d5db"></i>
      <h4 class="mt-3 fw-bold">Giỏ hàng trống</h4>
      <p class="text-muted">Bạn chưa có sản phẩm nào trong giỏ hàng.</p>
      <a href="#" onclick="event.preventDefault(); navigateTo('categories.html');"
        class="btn btn-custom-primary rounded-pill px-4">Mua sắm ngay <i class="bi bi-arrow-right"></i></a>
    </div>

    <div id="cart-main" class="d-none">
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-0">
              <div id="cart-items-list"></div>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mt-3">
            <a href="#" onclick="event.preventDefault(); navigateTo('categories.html');"
              class="btn btn-outline-secondary btn-sm rounded-pill">
              <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>
            <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="clearAll()">
              <i class="bi bi-trash"></i> Xóa tất cả
            </button>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card border-0 shadow-sm rounded-3 sticky-top" style="top: 76px">
            <div class="card-body">
              <h5 class="fw-bold mb-3">Tóm Tắt Đơn Hàng</h5>
              <div class="d-flex justify-content-between mb-2 small">
                <span class="text-muted">Tạm tính</span>
                <span id="subtotal-val" class="fw-medium">0đ</span>
              </div>
              <div class="d-flex justify-content-between mb-2 small">
                <span class="text-muted">Phí vận chuyển</span>
                <span id="shipping-val" class="fw-medium">30.000đ</span>
              </div>
              <div id="free-ship-note" class="alert alert-warning py-1 px-2 small mb-2 d-none">
                Mua thêm <strong id="more-to-free">0đ</strong> để được miễn
                phí vận chuyển
              </div>
              <hr />
              <div class="d-flex justify-content-between mb-3 fw-bold">
                <span>Tổng cộng</span>
                <span class="text-primary fs-5" id="total-val">0đ</span>
              </div>
              <div class="input-group mb-3">
                <input type="text" class="form-control form-control-sm" placeholder="Mã giảm giá" />
                <button class="btn btn-outline-secondary btn-sm">
                  Áp dụng
                </button>
              </div>
              <a href="#" onclick="event.preventDefault(); navigateTo('checkout.html');"
                class="btn btn-custom-primary w-100 rounded-pill fw-bold">
                Thanh Toán <i class="bi bi-arrow-right"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JavaScript/products.js"></script>
  <script src="../JavaScript/cart.js"></script>
  <script src="../JavaScript/components.js"></script>
  <script>
    renderNavbar("");
    renderFooter();

    function renderCartPage() {
      const items = Cart.getItems();
      const total = Cart.getTotal();
      const shipping = total >= 150000 ? 0 : 30000;
      const grandTotal = total + shipping;

      document.getElementById("cart-count-label").textContent =
        `${items.length} sản phẩm`;

      if (items.length === 0) {
        document.getElementById("empty-cart").classList.remove("d-none");
        document.getElementById("cart-main").classList.add("d-none");
        return;
      }
      document.getElementById("empty-cart").classList.add("d-none");
      document.getElementById("cart-main").classList.remove("d-none");

      document.getElementById("subtotal-val").textContent =
        formatPrice(total);
      document.getElementById("shipping-val").textContent =
        shipping === 0
          ? '<span class="text-success">Miễn phí</span>'
          : formatPrice(shipping);
      document.getElementById("shipping-val").innerHTML =
        shipping === 0
          ? '<span class="text-success fw-medium">Miễn phí</span>'
          : formatPrice(shipping);
      document.getElementById("total-val").textContent =
        formatPrice(grandTotal);

      const noteEl = document.getElementById("free-ship-note");
      if (shipping > 0) {
        noteEl.classList.remove("d-none");
        document.getElementById("more-to-free").textContent = formatPrice(
          150000 - total,
        );
      } else {
        noteEl.classList.add("d-none");
      }

      const list = document.getElementById("cart-items-list");
      list.innerHTML = items
        .map(
          (item, idx) => `
      <div class="d-flex align-items-center gap-3 p-3 ${idx < items.length - 1 ? "border-bottom" : ""}">
        <a href="products-detail.html?id=${item.id}">
          <img src="${item.cover}" alt="${item.title}" style="width:70px;height:95px;object-fit:cover;border-radius:8px">
        </a>
        <div class="flex-grow-1 min-width-0">
          <a href="products-detail.html?id=${item.id}" class="text-decoration-none">
            <h6 class="fw-semibold mb-1 text-dark" style="font-size:.9rem">${item.title}</h6>
          </a>
          <p class="text-muted small mb-2">${item.brand}</p>
          <span class="fw-bold text-primary">${formatPrice(item.price)}</span>
        </div>
        <div class="d-flex align-items-center gap-2 flex-shrink-0">
          <div class="d-flex align-items-center border rounded-2">
            <button class="btn btn-sm px-2 py-1" onclick="changeQty(${item.id}, ${item.quantity - 1})"><i class="bi bi-dash"></i></button>
            <span class="px-2 fw-medium" style="min-width:30px;text-align:center">${item.quantity}</span>
            <button class="btn btn-sm px-2 py-1" onclick="changeQty(${item.id}, ${item.quantity + 1})"><i class="bi bi-plus"></i></button>
          </div>
          <span class="fw-bold small" style="min-width:80px;text-align:right">${formatPrice(item.price * item.quantity)}</span>
          <button class="btn btn-sm text-danger" onclick="removeItem(${item.id})" title="Xóa"><i class="bi bi-trash3"></i></button>
        </div>
      </div>`,
        )
        .join("");
    }

    function changeQty(id, qty) {
      Cart.updateQuantity(id, qty);
      renderCartPage();
    }

    function removeItem(id) {
      Cart.removeItem(id);
      renderCartPage();
    }

    function clearAll() {
      if (confirm("Bạn có chắc muốn xóa tất cả sản phẩm trong giỏ hàng?")) {
        Cart.clearCart();
        renderCartPage();
      }
    }

    renderCartPage();
  </script>
</body>

</html>
